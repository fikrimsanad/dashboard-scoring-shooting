services:
  web:
    image: node:22-alpine
    container_name: dashboard-scoring-shooting-web
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
      - pnpm_store:/pnpm/store
    command: >
      sh -c "corepack enable &&
      pnpm config set store-dir /pnpm/store &&
      pnpm install &&
      pnpm dev"
    restart: unless-stopped

  web-prod:
    image: node:22-alpine
    container_name: dashboard-scoring-shooting-web-prod
    working_dir: /app
    profiles:
      - prod
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    volumes:
      - ./:/app
      - node_modules_prod:/app/node_modules
      - pnpm_store:/pnpm/store
      - next_cache:/app/.next
    command: >
      sh -c "corepack enable &&
      pnpm config set store-dir /pnpm/store &&
      pnpm install --frozen-lockfile &&
      pnpm build &&
      pnpm start"
    restart: unless-stopped

volumes:
  node_modules:
  node_modules_prod:
  pnpm_store:
  next_cache:
